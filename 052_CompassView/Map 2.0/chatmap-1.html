<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Location Map Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  body {
    margin: 0;
    background: #f2f2f2;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #map-container {
    width: 80vw;
    max-width: 900px;
    height: 70vh;
    max-height: 700px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    background: #ddd;
  }

  #map {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div id="map-container">
  <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Fixed coordinates
  const lat = 42.368806;
  const lon = -71.059608;

  // Create map
  const map = L.map('map', {
    zoomControl: true,
    attributionControl: false
  }).setView([lat, lon], 14); // Zoom level controls how much area you see

  // Simple, clean map tiles (Carto Light)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Marker at photo location
  L.marker([lat, lon]).addTo(map)
    .bindPopup("Photo Location")
    .openPopup();
</script>

</body>
</html>
