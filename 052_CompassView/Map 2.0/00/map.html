<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Location Map Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  body {
    margin: 0;
    background: #f2f2f2;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #map-container {
    width: 80vw;
    max-width: 900px;
    height: 70vh;
    max-height: 700px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    background: #ddd;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* Camera marker styling */
  .camera-marker {
    width: 80px;
    height: 80px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .camera-marker img {
    width: 60px;
    height: 60px;
    transform-origin: center center;
  }
</style>
</head>
<body>

<div id="map-container">
  <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Fixed coordinates
  const lat = 42.368806;
  const lon = -71.059608;

  // Fixed camera direction in degrees
  // 0° = north, 90° = east — standard compass bearing
  const cameraHeading = 102;

  // Create map
  const map = L.map('map', {
    zoomControl: true,
    attributionControl: false
  }).setView([lat, lon], 14);

  // Simple clean basemap
//   L.tileLayer('https://{s}.basemaps.cartocdn.com/positron/{z}/{x}/{y}{r}.png', {
//     subdomains: 'abcd',
//     maxZoom: 19
//   }).addTo(map);

//   L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
//   subdomains: 'abcd',
//   maxZoom: 19
// }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

  // Create custom camera icon using a div
  const cameraIcon = L.divIcon({
    className: '',
    html: `
      <div class="camera-marker">
        <img src="camera.svg"
             style="transform: rotate(${cameraHeading}deg);">
      </div>
    `,
    iconSize: [40, 40],
    iconAnchor: [20, 20]
  });

  // Place marker
  L.marker([lat, lon], { icon: cameraIcon })
    .addTo(map)
    .bindPopup(`Photo Location<br>Heading: ${cameraHeading}°`)
    .openPopup();

</script>

</body>
</html>
