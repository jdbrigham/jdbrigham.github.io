<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Map w/ Park Boundaries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />

<style>
  body {
    margin: 0;
    background: #f2f2f2;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #map-container {
    width: 80vw;
    max-width: 900px;
    height: 70vh;
    max-height: 700px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    background: #ddd;
  }
  #map { width: 100%; height: 100%; }
  .camera-marker {
    width: 40px; height: 40px;
    background: white; border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .camera-marker img {
    width: 26px; height: 26px;
    transform-origin: center center;
  }

  .camera-marker {
  width: 40px;
  height: 40px;
  transform: translate(-20px, -20px); /* center it */
}
</style>
</head>
<body>

<div id="map-container"><div id="map"></div></div>

<script>
  const photos = [
    { lat: 42.368806, lon: -71.059608, heading: 102, label: "Photo 1" },
    { lat: 42.352628, lon: -71.052239, heading: 219, label: "Photo 2" }
  ];

  mapboxgl.accessToken = 'pk.eyJ1IjoiamRicmlnaGFtIiwiYSI6ImNtbTF4N3YweTAxYmoycHFiYmg5YW5yaTkifQ.rvmCAAfDUvJcACLLpxH8cw';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [-71.06, 42.36], // Boston
    zoom: 13
  });

map.on('load', () => {
  const layers = map.getStyle().layers;

  map.addSource('boston-common', {
  type: 'geojson',
  data: 'parks.geojson'
});

map.addLayer({
  id: 'boston-common-fill',
  type: 'fill',
  source: 'boston-common',
  paint: {
    'fill-color': '#6aa84f',
    'fill-opacity': 0.8
  }
});

  layers.forEach(layer => {
    map.on('load', () => {
  map.getStyle().layers.forEach(layer => {

    const keep =
      layer.type === 'background' ||

      (layer.type === 'fill' && (
        layer['source-layer'] === 'water' ||
        layer['source-layer'] === 'landuse'
      )) ||

      (layer.type === 'line' &&
        layer['source-layer'] === 'road');

    if (!keep) {
      map.setLayoutProperty(layer.id, 'visibility', 'none');
    }

  });
});

    map.getStyle().layers.forEach(layer => {
  if (layer.type === 'background') {
    map.setPaintProperty(layer.id, 'background-color', '#f4f1ea'); // land color
  }

  if (layer.type === 'fill' && layer['source-layer'] === 'water') {
    map.setPaintProperty(layer.id, 'fill-color', '#1f2f3a'); // water color
  }

  // if (layer.type === 'fill' && layer['source-layer'] === 'landuse') {
  //   map.setPaintProperty(layer.id, 'fill-color', '#9fbf9f'); // park color
  // }

  // if (layer.type === 'fill' && layer['source-layer'] === 'landuse') {
  //   // Only keep actual parks
  //   map.setFilter(layer.id, ['==', ['get', 'class'], 'park']);
  //   map.setPaintProperty(layer.id, 'fill-color', '#9fbf9f'); // park color
  // }
});
  });
});

function addPhotoMarker(photo) {
  const el = document.createElement('div');
  el.className = 'camera-marker';

  el.innerHTML = `
    <img 
      src="https://cdn-icons-png.flaticon.com/512/685/685655.png"
      style="width:40px;height:40px;transform: rotate(${photo.heading}deg);"
    />
  `;

  const popup = new mapboxgl.Popup({ offset: 25 })
    .setHTML(`${photo.label}<br>Heading: ${photo.heading}°`);

  new mapboxgl.Marker(el)
    .setLngLat([photo.lon, photo.lat]) // NOTE: lng, lat order
    .setPopup(popup)
    .addTo(map);
}

photos.forEach(addPhotoMarker);



</script>

</body>
</html>
