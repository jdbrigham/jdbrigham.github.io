<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Location Map Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  body {
    margin: 0;
    background: #f2f2f2;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #map-container {
    width: 80vw;
    max-width: 900px;
    height: 70vh;
    max-height: 700px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    background: #ddd;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  .camera-marker {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .camera-marker img {
    width: 26px;
    height: 26px;
    transform-origin: center center;
  }
</style>
</head>
<body>

<div id="map-container">
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // ---------------------------
  // Photo data (later this comes from uploads)
  // ---------------------------

  const photos = [
    {
      lat: 42.368806,
      lon: -71.059608,
      heading: 102,
      label: "Photo 1"
    },
    {
      lat: 42.352628,
      lon: -71.052239,
      heading: 219,
      label: "Photo 2"
    }
  ];

  // ---------------------------
  // Initialize map
  // ---------------------------

  // Center map on first photo (your "home" Boston view)
  const map = L.map('map', {
    zoomControl: true,
    attributionControl: false
  }).setView([photos[0].lat, photos[0].lon], 13);

  // Carto light basemap
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // ---------------------------
  // Helper: create a camera marker
  // ---------------------------

  function addPhotoMarker(photo) {

    const cameraIcon = L.divIcon({
      className: '',
      html: `
        <div class="camera-marker">
          <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png"
               style="transform: rotate(${photo.heading}deg);">
        </div>
      `,
      iconSize: [40, 40],
      iconAnchor: [20, 20]
    });

    L.marker([photo.lat, photo.lon], { icon: cameraIcon })
      .addTo(map)
      .bindPopup(`${photo.label}<br>Heading: ${photo.heading}°`);
  }

  // ---------------------------
  // Add all photos to map
  // ---------------------------

  photos.forEach(addPhotoMarker);

</script>

</body>
</html>
