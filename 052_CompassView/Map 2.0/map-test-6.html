<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapbox GL Minimal Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  </style>
</head>
<body>
<div id="map"></div>

<script>
  const photos = [
    { lat: 42.368806, lon: -71.059608, heading: 102, label: "Photo 1" },
    { lat: 42.352628, lon: -71.052239, heading: 219, label: "Photo 2" }
  ];
  mapboxgl.accessToken = 'pk.eyJ1IjoiamRicmlnaGFtIiwiYSI6ImNtbTF4N3YweTAxYmoycHFiYmg5YW5yaTkifQ.rvmCAAfDUvJcACLLpxH8cw';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [-71.06, 42.36], // Boston
    zoom: 13
  });

  map.on('load', () => {
  const layers = map.getStyle().layers;

  map.addSource('boston-common', {
  type: 'geojson',
  data: 'parks.geojson'
});

  map.addLayer({
  id: 'boston-common-fill',
  type: 'fill',
  source: 'boston-common',
  paint: {
    'fill-color': '#6aa84f',
    'fill-opacity': 0.8
  }
});

// add my own layer for roads
map.addLayer({
  id: 'major-roads',
  type: 'line',
  source: 'composite',
  'source-layer': 'road',
  filter: [
    'any',
    ['==', ['get', 'class'], 'primary'],
    ['==', ['get', 'class'], 'trunk'],
    ['==', ['get', 'class'], 'motorway'],
    ['==', ['get', 'structure'], 'bridge']
  ],
  paint: {
    'line-color': '#000000',
    'line-width': 1.25
  }
});

// add my own layer for water
map.addLayer({
  id: 'major-water',
  type: 'fill',
  source: 'composite',
  'source-layer': 'water',
  filter: [
    'any',
    ['==', ['get', 'class'], 'river'],
    ['==', ['get', 'class'], 'ocean'],
    ['==', ['get', 'class'], 'lake']
  ],
  paint: {
    'fill-color': '#d6eaf8'
  }
});

  layers.forEach(layer => {
    const keep =
      layer.type === 'background' ||
      (layer.type === 'fill' && (
        layer['source-layer'] === 'water' ||
        layer['source-layer'] === 'landuse'
      ));

    if (!keep && map.getLayer(layer.id)) {
      map.removeLayer(layer.id);
    }

    map.getStyle().layers.forEach(layer => {
  if (layer.type === 'background') {
    map.setPaintProperty(layer.id, 'background-color', '#f4f1ea'); // land color
  }

  if (layer.type === 'fill' && layer['source-layer'] === 'water') {
    map.setPaintProperty(layer.id, 'fill-color', 'darkblue'); // water color
  }

  // if (layer.type === 'fill' && layer['source-layer'] === 'landuse') {
  //   map.setPaintProperty(layer.id, 'fill-color', '#9fbf9f'); // park color
  // }

  // if (layer.type === 'fill' && layer['source-layer'] === 'landuse') {
  //   // Only keep actual parks
  //   map.setFilter(layer.id, ['==', ['get', 'class'], 'park']);
  //   map.setPaintProperty(layer.id, 'fill-color', '#9fbf9f'); // park color
  // }
});
  });
});

function addPhotoMarker(photo) {
  const el = document.createElement('div');
  el.className = 'camera-marker';

  el.innerHTML = `
    <img 
      src="https://cdn-icons-png.flaticon.com/512/685/685655.png"
      style="width:40px;height:40px;transform: rotate(${photo.heading}deg);"
    />
  `;

  const popup = new mapboxgl.Popup({ offset: 25 })
    .setHTML(`${photo.label}<br>Heading: ${photo.heading}°`);

  new mapboxgl.Marker(el)
    .setLngLat([photo.lon, photo.lat]) // NOTE: lng, lat order
    .setPopup(popup)
    .addTo(map);
}

photos.forEach(addPhotoMarker);

map.on('click', e => {
  const features = map.queryRenderedFeatures(e.point, {
    layers: ['water']
  });
  console.log(features);
});
</script>

</body>
</html>
