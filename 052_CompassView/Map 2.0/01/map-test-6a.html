<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapbox GL Minimal Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  </style>
</head>
<body>
<div id="map"></div>

<script>
  const photos = [
    { lat: 42.368806, lon: -71.059608, heading: 102, label: "Photo 1" },
    { lat: 42.352628, lon: -71.052239, heading: 219, label: "Photo 2" }
  ];
  mapboxgl.accessToken = 'pk.eyJ1IjoiamRicmlnaGFtIiwiYSI6ImNtbTF4N3YweTAxYmoycHFiYmg5YW5yaTkifQ.rvmCAAfDUvJcACLLpxH8cw';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [-71.06, 42.36], // Boston
    zoom: 13
  });

  map.on('load', () => {

  // 1️⃣ Hide all original layers FIRST
  map.getStyle().layers.forEach(layer => {
    map.setLayoutProperty(layer.id, 'visibility', 'none');
  });



  // 2️⃣ Add background FIRST
  map.addLayer({
    id: 'bg',
    type: 'background',
    paint: {
      'background-color': '#f4f1ea'
    }
  });

  // 3️⃣ Add water
map.addLayer({
  id: 'major-water',
  type: 'fill',
  source: 'composite',
  'source-layer': 'water',
  paint: {
    'fill-color': '#bbdefb'
  }
});

// add separate layer for rivers
map.addLayer({
  id: 'waterways',
  type: 'line',
  source: 'composite',
  'source-layer': 'waterway',
  paint: {
    'line-color': '#bbdefb',
    'line-width': 1
  }
});

  // 4️⃣ Add landuse
  // map.addLayer({
  //   id: 'sand',
  //   type: 'fill',
  //   source: 'composite',
  //   'source-layer': 'landuse',
  //   paint: {
  //     'fill-color': '#99d8c9',
  //     'fill-opacity': 1.0
  //   }
  // });

  // alternative land use layer
//   map.addLayer({
//   id: 'parks-only',
//   type: 'fill',
//   source: 'composite',
//   'source-layer': 'landuse',
//   // or
//   // filter: ['has', 'class']
//   filter: ['==', ['get', 'class'], 'park'],
//   paint: {
//     'fill-color': '#99d8c9',
//     'fill-opacity': 1.0
//   }
// });

  // 5️⃣ Add roads
  map.addLayer({
    id: 'major-roads',
    type: 'line',
    source: 'composite',
    'source-layer': 'road',
    filter: [
      'any',
      // ['==', ['get', 'class'], 'motorway'],
      // ['==', ['get', 'class'], 'trunk'],
      ['==', ['get', 'class'], 'primary'],
      ['==', ['get', 'class'], 'secondary'],
      ['==', ['get', 'structure'], 'bridge']
    ],
    paint: {
      'line-color': '#888888',
      'line-width': [
        'interpolate',
        ['linear'],
        ['zoom'],
        12, 0.5,
        15, 2
      ]
    }
  });

  // add buildings
  map.addLayer({
  id: 'buildings',
  type: 'fill',
  source: 'composite',
  'source-layer': 'building',
  paint: {
    'fill-color': '#d9d9d9',
    'fill-opacity': 0.6
  }
});

  // 6️⃣ Add your GeoJSON parks LAST so they sit above landuse
  map.addSource('boston-common', {
    type: 'geojson',
    data: 'parks.geojson'
  });

  map.addLayer({
    id: 'boston-common-fill',
    type: 'fill',
    source: 'boston-common',
    paint: {
      'fill-color': '#6aa84f',
      'fill-opacity': 0.8
    }
  });

  // repeat for bunker hill
    map.addSource('bunker-hill', {
    type: 'geojson',
    data: 'bunker-hill.geojson'
  });

  map.addLayer({
    id: 'bunker-hill-fill',
    type: 'fill',
    source: 'bunker-hill',
    paint: {
      'fill-color': 'lightgreen',
      'fill-opacity': 0.8
    }
  });

    // repeat for airport runways
    map.addSource('logan', {
    type: 'geojson',
    data: 'logan.geojson'
  });

map.addLayer({
  id: 'logan-lines',
  type: 'line',
  source: 'logan',
  paint: {
    'line-color': [
      'match',
      ['get', 'aeroway'],
      'runway', '#222222',
      'taxiway', '#777777',
      '#999999'
    ],
    'line-width': [
      'match',
      ['get', 'aeroway'],
      'runway', 6,
      'taxiway', 2,
      1
    ],
    'line-opacity': 0.9
  }
});

});



  // });

function addPhotoMarker(photo) {
  const el = document.createElement('div');
  el.className = 'camera-marker';

  el.innerHTML = `
    <img 
      src="camera.svg"
      style="width:40px;height:40px;transform: rotate(${photo.heading}deg);"
    />
  `;

  const popup = new mapboxgl.Popup({ offset: 25 })
    .setHTML(`${photo.label}<br>Heading: ${photo.heading}°`);

  new mapboxgl.Marker(el)
    .setLngLat([photo.lon, photo.lat]) // NOTE: lng, lat order
    .setPopup(popup)
    .addTo(map);
}

photos.forEach(addPhotoMarker);

map.on('click', e => {
  const features = map.queryRenderedFeatures(e.point, {
    layers: ['sand']
  });
  console.log(features);
});
</script>

</body>
</html>
