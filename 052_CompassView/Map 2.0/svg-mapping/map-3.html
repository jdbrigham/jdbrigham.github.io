<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Map w/ Park Boundaries & Land Mask</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  body {
    margin: 0;
    background: #f2f2f2;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #map-container {
    width: 80vw;
    max-width: 900px;
    height: 70vh;
    max-height: 700px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    background: #ddd;
  }
  #map { width: 100%; height: 100%; }

  .camera-marker {
    width: 40px; height: 40px;
    background: white; border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .camera-marker img {
    width: 26px; height: 26px;
    transform-origin: center center;
  }
</style>
</head>
<body>

<div id="map-container"><div id="map"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // -----------------------------
  // 1. Photos & map setup
  // -----------------------------
  const photos = [
    { lat: 42.368806, lon: -71.059608, heading: 102, label: "Photo 1" },
    { lat: 42.352628, lon: -71.052239, heading: 219, label: "Photo 2" }
  ];

  const map = L.map('map', { zoomControl:true, attributionControl:false })
    .setView([photos[0].lat, photos[0].lon], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    subdomains:'abcd', maxZoom:19
  }).addTo(map);

  function addPhotoMarker(photo) {
    const icon = L.divIcon({
      className: '',
      html:`<div class="camera-marker">
              <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png"
                   style="transform: rotate(${photo.heading}deg);">
            </div>`,
      iconSize:[40,40], iconAnchor:[20,20]
    });
    L.marker([photo.lat, photo.lon], {icon})
     .addTo(map)
     .bindPopup(`${photo.label}<br>Heading: ${photo.heading}°`);
  }
  photos.forEach(addPhotoMarker);

  // -----------------------------
  // 2. Parks overlay (GeoJSON)
  // -----------------------------
  fetch('parks.geojson')
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        style: {
          color: "#2a7f3e",
          weight: 0,
          fillColor: "#7ecf8e",
          fillOpacity: 0.25
        }
      }).addTo(map);
    })
    .catch(err => console.warn('Park GeoJSON failed to load:', err));

  // -----------------------------
  // 1. Dummy land polygon (shoreline)
  // -----------------------------
  const landGeoJSON = {
    "type": "FeatureCollection",
    "features": [
      {
        "type": "Feature",
        "geometry": {
          "type": "Polygon",
          "coordinates": [[
            [-71.10,42.30],
            [-71.10,42.40],
            [-70.95,42.40],
            [-70.95,42.30],
            [-71.10,42.30]
          ]]
        }
      }
    ]
  };

  // -----------------------------
  // 2. Land mask drawing functions (reused)
  // -----------------------------
  function projectPoint(lat, lon) {
    const point = map.latLngToLayerPoint([lat, lon]);
    return [point.x, point.y];
  }

  function polygonToPath(coords) {
    let path = "";
    coords.forEach(ring => {
      ring.forEach((pt,i) => {
        const p = projectPoint(pt[1], pt[0]);
        path += (i===0 ? "M " : "L ") + p[0] + " " + p[1] + " ";
      });
      path += "Z ";
    });
    return path;
  }

  function drawLandMask(landData, parksData, waterData, g) {
    while (g.firstChild) g.removeChild(g.firstChild);

    // Land polygons (shoreline)
    let pathData = "";
    landData.features.forEach(feature => {
      const geom = feature.geometry;
      if (geom.type === "Polygon") pathData += polygonToPath(geom.coordinates);
      if (geom.type === "MultiPolygon") geom.coordinates.forEach(p => pathData += polygonToPath(p));
    });

    // Cut out parks
    parksData.features.forEach(feature => {
      const geom = feature.geometry;
      if (geom.type === "Polygon") pathData += polygonToPath(geom.coordinates);
      if (geom.type === "MultiPolygon") geom.coordinates.forEach(p => pathData += polygonToPath(p));
    });

    // Cut out water
    waterData.features.forEach(feature => {
      const geom = feature.geometry;
      if (geom.type === "Polygon") pathData += polygonToPath(geom.coordinates);
      if (geom.type === "MultiPolygon") geom.coordinates.forEach(p => pathData += polygonToPath(p));
    });

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", pathData);
    path.setAttribute("fill", "#e6dfd3");  // land color
    path.setAttribute("fill-rule", "evenodd"); // holes are transparent
    path.setAttribute("stroke", "#cbbfae");
    path.setAttribute("stroke-width", "1");
    path.setAttribute("opacity", "0.6");
    path.style.pointerEvents = "none";

    g.appendChild(path);
  }

  // -----------------------------
  // 3. Load parks/water and draw land mask
  // -----------------------------
  Promise.all([
    fetch("parks.geojson").then(r => r.json()),
    fetch("water.geojson").then(r => r.json())
  ])
  .then(([parksData, waterData]) => {
    const svg = map.getPanes().overlayPane.querySelector("svg.leaflet-zoom-animated");
    if (!svg) return console.error("Leaflet overlay SVG not found!");

    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "land-mask");
    svg.appendChild(g);

    drawLandMask(landGeoJSON, parksData, waterData, g);

    map.on("zoomend moveend", () => drawLandMask(landGeoJSON, parksData, waterData, g));
  })
  .catch(err => console.error("Error loading parks/water GeoJSON:", err));
</script>

</body>
</html>
