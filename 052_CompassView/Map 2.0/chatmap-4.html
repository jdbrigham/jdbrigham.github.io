<!DOCTYPE html>

<title>Photo Map w/ Park Boundaries</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  body {
    margin: 0;
    background: #f2f2f2;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #map-container {
    width: 80vw;
    max-width: 900px;
    height: 70vh;
    max-height: 700px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    background: #ddd;
  }
  #map { width: 100%; height: 100%; }
  .camera-marker {
    width: 40px; height: 40px;
    background: white; border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .camera-marker img {
    width: 26px; height: 26px;
    transform-origin: center center;
  }
</style>
</head>
<body>

<div id="map-container"><div id="map"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    { lat: 42.352628, lon: -71.052239, heading: 219, label: "Photo 2" }
  ];

  const map = L.map('map', { zoomControl:true, attributionControl:false })
    .setView([photos[0].lat, photos[0].lon], 13);

L.tileLayer(

    tileSize: 512,
    zoomOffset: -1,
    attribution: '© Mapbox © OpenStreetMap'
  }
).addTo(map);




  function addPhotoMarker(photo) {
    const icon = L.divIcon({
      className: '',
      html:`<div class="camera-marker">
              <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png"
                   style="transform: rotate(${photo.heading}deg);">
            </div>`,
      iconSize:[40,40], iconAnchor:[20,20]
    });
    L.marker([photo.lat, photo.lon], {icon})
     .addTo(map)
     .bindPopup(`${photo.label}<br>Heading: ${photo.heading}°`);
  }
  photos.forEach(addPhotoMarker);

  // -- Park boundaries overlay --
  fetch('parks.geojson')
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        style: {
          color: "#2a7f3e",        // boundary stroke color
          weight: 2,
          fillColor: "#7ecf8e",    // fill color
          fillOpacity: 0.25
        }
      }).addTo(map);
    })
    .catch(err => console.warn('Park GeoJSON failed to load:', err));
