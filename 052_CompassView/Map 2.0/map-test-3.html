<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapbox GL Minimal Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  </style>
</head>
<body>
<div id="map"></div>

<script>
  mapboxgl.accessToken = 'pk.eyJ1IjoiamRicmlnaGFtIiwiYSI6ImNtbTF4N3YweTAxYmoycHFiYmg5YW5yaTkifQ.rvmCAAfDUvJcACLLpxH8cw';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [-71.06, 42.36], // Boston
    zoom: 13
  });

  console.log("Map object created");

  console.log(mapboxgl.version);

  map.on('load', () => {
  const layers = map.getStyle().layers;

  layers.forEach(layer => {
    const keep =
      layer.type === 'background' ||
      (layer.type === 'fill' && (
        layer['source-layer'] === 'water' ||
        layer['source-layer'] === 'landuse'
      ));

    if (!keep && map.getLayer(layer.id)) {
      map.removeLayer(layer.id);
    }

    map.getStyle().layers.forEach(layer => {
  if (layer.type === 'background') {
    map.setPaintProperty(layer.id, 'background-color', '#f4f1ea'); // land color
  }

  if (layer.type === 'fill' && layer['source-layer'] === 'water') {
    map.setPaintProperty(layer.id, 'fill-color', '#1f2f3a'); // water color
  }

  if (layer.type === 'fill' && layer['source-layer'] === 'landuse') {
    map.setPaintProperty(layer.id, 'fill-color', '#9fbf9f'); // park color
  }
});
  });
});
</script>

</body>
</html>
