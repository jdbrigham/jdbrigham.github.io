<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <link rel="stylesheet" href="boxes.css"> -->
   <style>
      /*
      Source - https://stackoverflow.com/q/59823984
      Posted by Zoltan King, modified by community. See post 'Timeline' for change history
      Retrieved 2026-04-10, License - CC BY-SA 4.0
      */

      :root {
        box-sizing: border-box;
      }

      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }

      body {
        margin: 0;
        padding: 0;
      }

      .grid-container {
        display: grid;
        max-width: 600px;
        height: 110px;
        overflow: auto;
        grid-template-columns: repeat(auto-fill, 50px);
        justify-content: space-between;
        align-items: center;
        grid-gap: 4px;
        border: 1px solid red;
      }

      .button {
        display: flex;
        justify-content: center;
        align-items: center;
        background: skyblue;
        width: 50px;
        height: 50px;
        font-size: 1rem;
        border: none;
        outline-color: #00A8EF;
        cursor: pointer;
      }

      @media screen and (min-width: 37.5em) {
        .grid-container {
          height: auto;
        }
      }
    </style>
  <title>Boxes</title>
</head>
<body>
  <div class="grid-container">
    <button class="button button1">1</button>
    <button class="button button2">2</button>
    <button class="button button3">3</button>
    <button class="button button4">4</button>
    <button class="button button5">5</button>
    <button class="button button6">6</button>
    <button class="button button7">7</button>
    <button class="button button8">8</button>
    <button class="button button9">9</button>
    <button class="button button10">10</button>
    <button class="button button11">11</button>
  </div>
</body>
</html>
