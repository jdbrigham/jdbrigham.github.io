<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Archive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            color: white;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #e2e8f0;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        .year-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #475569;
            margin-bottom: 16px;
            width: 100%;
            max-width: 700px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 700px;
            margin-bottom: 48px;
        }

        /* ── Active month card ── */
        .month-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px 12px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }

        .month-card:hover {
            background: #1e293b;
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .month-card:active {
            transform: translateY(0);
        }

        /* ── Inactive month card ── */
        .month-card.inactive {
            background: #0f172a;
            border-color: #1e293b;
            opacity: 0.35;
            cursor: default;
            pointer-events: none;
        }

        /* ── Calendar icon ── */
        .cal-icon {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            background: #1e293b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .month-card:hover .cal-icon {
            background: #263548;
        }

        .cal-top {
            background: #3b82f6;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .cal-ring {
            width: 3px;
            height: 6px;
            background: white;
            border-radius: 1px;
            margin-top: -3px;
        }

        .cal-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #e2e8f0;
            line-height: 1;
        }

        .month-card.inactive .cal-top {
            background: #334155;
        }

        .month-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
            text-align: center;
        }

        .month-card.inactive .month-name {
            color: #475569;
        }

        ol {
            width: 100%;
            max-width: 700px;
            padding-left: 1.5rem;
            color: #cbd5e1;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        ol li {
            margin-bottom: 8px;
        }

        ol li::marker {
            color: #3b82f6;
            font-weight: 700;
        }

        ol li strong {
            color: #e2e8f0;
        }

        /* ── Responsive: 3 cols on narrow ── */
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <h1>🗺️ Route Animator - Prep Instructions</h1>
    
    <ol>
        <li>On iPhone, in Google Maps go to settings and export entire timeline</li>
        <li>Open the full timeline in <a href='https://jbrigham.com/048/' target="_blank">JSON editor</a>></a></li>

    </ol>



</body>
</html>
