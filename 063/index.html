<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Massachusetts — Pieces Assemble</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f6f6;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .frame {
      width: min(92vw, 1000px);
      aspect-ratio: 5 / 3; /* Adjust or remove; only affects container height */
      display: grid;
      place-items: center;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      padding: 10px;
    }
    svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible; /* lets pieces fly a bit outside without clipping */
    }

    /* Critical for nice per-piece rotations/translations in SVG */
    #pieces > * {
      transform-box: fill-box;   /* use element's own box */
      transform-origin: center;  /* rotate around its center */
      will-change: transform;
    }

    /* Optional: crisp, monochrome look */
    #pieces path, #pieces polygon, #pieces rect, #pieces circle, #pieces ellipse {
      fill: #000;
    }

    /* Replay button */
    .replay {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      padding: .6rem .9rem;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: .95rem;
      box-shadow: 0 3px 12px rgba(0,0,0,.08);
    }
    .replay:active { transform: translateY(1px); }
    @media (prefers-color-scheme: dark) {
      body { background: #0d0d0d; }
      .frame { background: #111; box-shadow: 0 10px 40px rgba(0,0,0,.45); }
      .replay { background: #191919; border-color: #333; color: #eee; }
      #pieces path, #pieces polygon, #pieces rect, #pieces circle, #pieces ellipse { fill: #eee; }
    }

    .btn-container {
      width: 90%;
      display: flex;
      background-color: #000;
    }

    .box-button {
        display: inline-flex;          /* keeps text centered */
        align-items: center;           /* vertical centering */
        justify-content: center;       /* horizontal centering */
        padding: 12px 24px;            /* adjust size */
        border: 1px solid white;       /* white rectangular outline */
        color: white;                  /* text color */
        text-decoration: none;         /* remove underline */
        font-weight: normal;             /* bold text */
        font-family: sans-serif;
        letter-spacing: 1px;           /* optional: spaced-out text */

        background: transparent;       /* transparent fill */
        transition: background 0.2s, color 0.2s;
        margin: 22px;
    }

    .box-button:hover {
        background: white;             /* hover effect */
        color: black;
    }
  </style>
</head>

  <button class="replay" id="replay" title="Re-jumble and assemble again">Replay</button>

  <script>
    (function () {
      const svg = document.getElementById('map');
      const pieces = Array.from(document.querySelectorAll('#pieces > *')); // direct children are treated as individual pieces
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Tweak these to taste
      const opts = {
        duration: 2200,            // ms for each piece
        easing: 'cubic-bezier(.22,.61,.36,1)', // snappy "standard" ease
        stagger: 45,               // ms between pieces
        jitter: 60,                // random extra delay per piece
        maxTranslatePx: 180,       // initial scatter distance in px (auto-rescaled on load)
        maxRotateDeg: 180,         // initial random rotation range [-max, +max]
        minScale: 0.65,
        maxScale: 1.25
      };

      function rand(min, max) { return min + Math.random() * (max - min); }
      function randSign() { return Math.random() < 0.5 ? -1 : 1; }

      function makeStartTransform() {
        const dx = rand(-opts.maxTranslatePx, opts.maxTranslatePx);
        const dy = rand(-opts.maxTranslatePx, opts.maxTranslatePx);
        const rot = rand(-opts.maxRotateDeg, opts.maxRotateDeg);
        const scl = rand(opts.minScale, opts.maxScale);
        return `translate(${dx}px, ${dy}px) rotate(${rot}deg) scale(${scl})`;
      }

      function animateIn() {
        const baseDelay = 100;
        pieces.forEach((el, i) => {
          const start = makeStartTransform();

          // Set starting jumble transform immediately
          el.style.transform = start;

          if (prefersReduced) {
            // Respect reduced motion: snap to final
            el.style.transform = 'none';
            return;
          }

          const delay = baseDelay + i * opts.stagger + Math.random() * opts.jitter;

          const anim = el.animate(
            [
              { transform: start },
              { transform: 'none' } // end at original layout (no CSS transform)
            ],
            {
              duration: opts.duration,
              delay,
              easing: opts.easing,
              fill: 'forwards'
            }
          );

          // Ensure inline style ends cleanly at 'none'
          anim.onfinish = () => { el.style.transform = 'none'; };
        });
      }

      function reset() {
        pieces.forEach(el => {
          el.getAnimations().forEach(a => a.cancel());
          el.style.transform = 'none';
        });
      }

      // Replay button: re-jumble then assemble again
      document.getElementById('replay').addEventListener('click', () => {
        reset();
        // Using double rAF to ensure layout flush before starting new animations
        requestAnimationFrame(() => requestAnimationFrame(animateIn));
      });

      // Kick off once layout is known; scale jumble to canvas size
      window.addEventListener('load', () => {
        const rect = svg.getBoundingClientRect();
        const base = Math.min(rect.width, rect.height);
        // Keep scatter proportional to current size, but within reasonable bounds
        opts.maxTranslatePx = Math.max(100, Math.min(0.45 * base, 260));
        animateIn();
      });
    })();
  </script>
