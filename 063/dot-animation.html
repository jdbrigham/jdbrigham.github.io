<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Progressive Random SVG Dots (Blue Palette)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* --- Layout: center the SVG on the page --- */
    html, body {
      height: 100%;
      margin: 0;
      background: #111;           /* dark backdrop so blue dots pop */
      color: #eee;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 2rem;
      box-sizing: border-box;
      gap: 1rem;
    }

    /* --- Controls row --- */
    .controls {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1rem 1rem;
      align-items: start;
      width: min(95vw, 1200px);
    }

    .btn {
      appearance: none;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      padding: 0.55rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 140ms ease, border-color 140ms ease;
    }
    .btn:hover { background: #2a2a2a; border-color: #555; }
    .btn:active { background: #1a1a1a; }

    /* --- Progress bar --- */
    .progress-wrap {
      display: grid;
      gap: 0.4rem;
    }
    .progress-label {
      font-size: 0.9rem;
      opacity: 0.8;
    }
    .progress {
      position: relative;
      height: 10px;
      width: 100%;
      background: #2a2a2a;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px #333;
    }
    .progress__bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7aa2ff, #55d4ff);
      border-radius: 999px;
      transition: width 160ms ease;
    }
    @media (prefers-reduced-motion: reduce) {
      .progress__bar { transition: none; }
    }

    /* --- Palette controls (optional knobs) --- */
    fieldset {
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      min-width: 0;
      display: grid;
      gap: 0.5rem;
      background: #181818;
    }
    legend {
      padding: 0 0.25rem;
      font-size: 0.95rem;
      color: #b9d4ff;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 0.75rem;
      align-items: center;
    }
    .row label {
      opacity: 0.85;
      font-size: 0.9rem;
    }
    .row input[type="number"],
    .row input[type="range"] {
      width: 100%;
    }
    .hint {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* --- SVG host & responsiveness --- */
    .svg-host {
      max-width: min(95vw, 1200px);
      width: 100%;
    }
    .svg-host svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* --- Reveal animation (fade-in) --- */
    .dot-hidden {
      opacity: 0;
    }
    .dot-visible {
      opacity: 1;
      transition: opacity 320ms ease-out;
    }
    @media (prefers-reduced-motion: reduce) {
      .dot-visible { transition: none; }
    }

    /* Helper legend */
    .legend {
      font-size: 0.92rem;
      opacity: 0.75;
      width: min(95vw, 1200px);
      text-align: left;
    }
  </style>
</head>

  <script>
    /**
     * Config: tweak these to taste
     */
    const REVEAL_INTERVAL_MS = 30;   // time between revealing dots
    const BATCH_SIZE = 3;            // how many dots to reveal per tick
    const SKIP_FIRST_PATH = true;    // skip the first path in #g1 (commonly a background)

    // State
    let timerId = null;

    /**
     * Utility: Fisher–Yates shuffle
     */
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    /**
     * Random number within [min, max]
     */
    function rnd(min, max) {
      return Math.random() * (max - min) + min;
    }

    /**
     * Generate a random blue color in HSLA within the user-specified ranges.
     */
    function randomBlue() {
      // Read inputs (fall back to defaults if not found)
      const hueMin = parseFloat(document.getElementById('hueMin')?.value ?? '200');
      const hueMax = parseFloat(document.getElementById('hueMax')?.value ?? '230');
      const satMin = parseFloat(document.getElementById('satMin')?.value ?? '55');
      const satMax = parseFloat(document.getElementById('satMax')?.value ?? '90');
      const lightMin = parseFloat(document.getElementById('lightMin')?.value ?? '45');
      const lightMax = parseFloat(document.getElementById('lightMax')?.value ?? '70');
      const alphaMin = parseFloat(document.getElementById('alphaMin')?.value ?? '0.85');
      const alphaMax = parseFloat(document.getElementById('alphaMax')?.value ?? '1');

      // Ensure min <= max
      const Hmin = Math.min(hueMin, hueMax);
      const Hmax = Math.max(hueMin, hueMax);
      const Smin = Math.min(satMin, satMax);
      const Smax = Math.max(satMin, satMax);
      const Lmin = Math.min(lightMin, lightMax);
      const Lmax = Math.max(lightMin, lightMax);
      const Amin = Math.min(alphaMin, alphaMax);
      const Amax = Math.max(alphaMin, alphaMax);

      const h = rnd(Hmin, Hmax);
      const s = rnd(Smin, Smax);
      const l = rnd(Lmin, Lmax);
      const a = rnd(Amin, Amax);

      return `hsla(${h.toFixed(0)} ${s.toFixed(0)}% ${l.toFixed(0)}% / ${a.toFixed(2)})`;
    }

    /**
     * Progress helpers
     */
    function updateProgress(revealed, total) {
      const pct = total > 0 ? Math.round((revealed / total) * 100) : 0;
      const bar = document.getElementById('progressBar');
      const pctEl = document.getElementById('progressPct');
      const countEl = document.getElementById('progressCount');
      const totalEl = document.getElementById('progressTotal');
      const progressEl = document.querySelector('.progress');

      if (bar) bar.style.width = pct + '%';
      if (pctEl) pctEl.textContent = pct + '%';
      if (countEl) countEl.textContent = String(revealed);
      if (totalEl) totalEl.textContent = String(total);
      if (progressEl) progressEl.setAttribute('aria-valuenow', String(pct));
    }

    function resetProgress(total) {
      updateProgress(0, total);
    }

    /**
     * Stop any running animation timer
     */
    function stopAnimation() {
      if (timerId !== null) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    /**
     * Start/restart the progressive random reveal
     */
    function startAnimation() {
      stopAnimation(); // ensure clean slate

      const g = document.querySelector('#g1');
      const legend = document.getElementById('legend');

      if (!g) {
        console.warn('No <g id="g1"> found. Nothing to animate.');
        if (legend) legend.textContent = 'No group #g1 found.';
        resetProgress(0);
        return;
      }

      // Get all path elements inside g1
      const allPaths = Array.from(g.querySelectorAll('path'));
      const pathsToAnimate = SKIP_FIRST_PATH ? allPaths.slice(1) : allPaths.slice();

      // Ensure background remains visible if we skip it
      if (SKIP_FIRST_PATH && allPaths.length > 0) {
        allPaths[0].classList.remove('dot-hidden', 'dot-visible');
        // Keep its original fill (do not recolor background)
        allPaths[0].style.fill = '';
      }

      // Hide all animatable dots & clear any previous color so replays get new colors
      pathsToAnimate.forEach(p => {
        p.classList.remove('dot-visible');
        p.classList.add('dot-hidden');
        p.style.fill = ''; // remove color from prior runs
      });

      // Shuffle order
      shuffle(pathsToAnimate);

      // Init progress
      let index = 0;
      const total = pathsToAnimate.length;
      resetProgress(total);
      if (legend) legend.textContent = total > 0 ? `Revealing ${total} dots…` : 'Nothing to reveal.';

      // Reveal loop
      timerId = setInterval(() => {
        const remaining = total - index;
        const countThisTick = Math.min(BATCH_SIZE, remaining);

        for (let b = 0; b < countThisTick; b++, index++) {
          const el = pathsToAnimate[index];

          // Assign a random blue color right before reveal
          el.style.fill = randomBlue();

          el.classList.remove('dot-hidden');
          el.classList.add('dot-visible');
        }

        updateProgress(index, total);

        if (index >= total) {
          stopAnimation();
          if (legend) {
            legend.textContent = `Done – ${total} dots revealed.`;
          }
        }
      }, REVEAL_INTERVAL_MS);
    }

    /**
     * Wire up events
     */
    window.addEventListener('DOMContentLoaded', () => {
      const replayBtn = document.getElementById('replayBtn');
      if (replayBtn) {
        replayBtn.addEventListener('click', () => {
          startAnimation();
        });
      }

      // Kick off on load
      startAnimation();
    });
  </script>
