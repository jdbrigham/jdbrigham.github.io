<script>
(function(){
  const DUR = parseInt(getComputedStyle(document.documentElement)
                .getPropertyValue('--duration'), 10) || 30000;

  const stage  = document.getElementById('stage');
  const svg    = stage.querySelector('svg');
  const path   = svg ? svg.querySelector('path') : null;
  const stats  = document.getElementById('stats');
  const bar    = document.getElementById('bar');
  const replay = document.getElementById('replay');

  if (!svg || !path) {
    stats.textContent = 'Please paste your single-path SVG (<svg> with one <path>) into the #stage element.';
    replay.disabled = true;
    return;
  }

  // Apply theme defaults (in case the pasted SVG has different stroke settings)
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', getComputedStyle(document.documentElement).getPropertyValue('--stroke').trim() || '#fff');
  path.setAttribute('stroke-width', getComputedStyle(document.documentElement).getPropertyValue('--stroke-width').trim() || '0.8');
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('stroke-linejoin', 'round');
  path.setAttribute('vector-effect', 'non-scaling-stroke');

  // Measure total length
  svg.getBoundingClientRect(); // ensure layout
  let totalLen = 0;
  try { totalLen = path.getTotalLength(); }
  catch (e) { svg.getClientRects(); totalLen = path.getTotalLength(); }

  // Initialize dash to fully hidden
  path.style.strokeDasharray  = totalLen;
  path.style.strokeDashoffset = totalLen;

  stats.textContent = `Total length: ${Math.round(totalLen).toLocaleString()} units  |  Duration: ${(DUR/1000).toFixed(1)}s`;

  // Animation
  let rafId = 0;
  function animate(){
    const t0 = performance.now();
    path.style.strokeDashoffset = totalLen;           // reset
    bar.style.right = '100%';                         // reset progress
    cancelAnimationFrame(rafId);

    function frame(now){
      const t = Math.min(1, (now - t0) / DUR);
      // ease in-out
      const eased = (t < 0.5) ? (2*t*t) : (-1 + (4 - 2*t)*t);
      path.style.strokeDashoffset = (1 - eased) * totalLen;
      bar.style.right = `${100 - t*100}%`;
      if (t < 1) rafId = requestAnimationFrame(frame);
    }
    rafId = requestAnimationFrame(frame);
  }

  replay.addEventListener('click', animate);
  animate(); // auto-start
})();
</script>
