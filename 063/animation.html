    <button id="replay">Replay</button>

  <script>
    const path = document.getElementById("path26");
    const replayBtn = document.getElementById("replay");

    function animatePath() {
      const length = path.getTotalLength();

      // Reset any previous animation
      path.style.transition = "none";
      path.style.strokeDasharray = length;
      path.style.strokeDashoffset = length;

      // Trigger a layout so styles are applied
      path.getBoundingClientRect();

      // Animate
      path.style.transition = "stroke-dashoffset 20s ease";
      path.style.strokeDashoffset = "0";
    }

    // Animate on page load
    window.addEventListener("load", animatePath);

    // Replay button
    replayBtn.addEventListener("click", animatePath);
  </script>
