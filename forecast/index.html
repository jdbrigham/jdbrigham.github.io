<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,700;0,9..40,800;1,9..40,200&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #0a1018;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 56px;
    gap: 14px;
  }

  /* ── Carousel wrapper ────────────────────── */
  .carousel-outer {
    width: 100%;
    max-width: 420px;
    position: relative;
  }

  .carousel-track-clip {
    overflow: hidden;
    border-radius: 28px;
  }

  .carousel-track {
    display: flex;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  /* ── Each card ───────────────────────────── */
  .forecast-card {
    min-width: 100%;
    padding: 30px 28px 28px;
    position: relative;
    background: linear-gradient(160deg, #1a3a6a 0%, #0f2040 100%);
    transition: background 1.2s ease;
    /* touch events pass through to JS */
    user-select: none;
  }

  /* period label — e.g. "Tonight" */
  .period-label {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 20px;
    text-align: center;
  }

  /* temp + wind */
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 26px;
  }

  .temp {
    font-size: 4rem;
    font-weight: 200;
    font-style: italic;
    color: rgba(255,255,255,0.90);
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .temp-deg {
    font-size: 1.7rem;
    vertical-align: super;
    font-weight: 200;
  }

  .wind-block { text-align: right; }

  .wind-dir {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.30);
    margin-bottom: 2px;
  }

  .wind-speed {
    font-size: 1.45rem;
    font-weight: 200;
    color: rgba(255,255,255,0.68);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .wind-mph {
    font-size: 0.60rem;
    color: rgba(255,255,255,0.28);
    display: block;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* headline */
  .headline {
    font-size: 2.5rem;
    font-weight: 800;
    color: rgba(255,255,255,0.95);
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 18px;
  }

  .divider {
    width: 28px;
    height: 2px;
    background: rgba(255,255,255,0.16);
    border-radius: 2px;
    margin-bottom: 18px;
  }

  /* detail prose */
  .detail {
    font-size: 1.5rem;
    font-weight: 400;
    color: rgba(255,255,255,0.58);
    line-height: 1.68;
    min-height: 5em; /* keep cards same height even if short text */
  }

  /* no-detail placeholder */
  .detail-placeholder {
    font-size: 0.82rem;
    font-weight: 400;
    font-style: italic;
    color: rgba(255,255,255,0.22);
    line-height: 1.6;
  }

  /* footer */
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
  }

  .footer-left { display: flex; flex-direction: column; gap: 2px; }

  .location {
    font-size: 0.70rem;
    font-weight: 500;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .updated {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.18);
  }

  .refresh-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.38);
    transition: background 0.2s, color 0.2s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
  .refresh-btn svg { width: 13px; height: 13px; }

  /* loading overlay */
  .load-overlay {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background: rgba(8,14,22,0.72);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    z-index: 10;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 1.5px solid rgba(255,255,255,0.12);
    border-top-color: rgba(255,255,255,0.55);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { font-size: 0.75rem; color: rgba(255,255,255,0.28); }

  .error-pill {
    background: rgba(140,35,25,0.30);
    border: 1px solid rgba(170,55,40,0.40);
    color: rgba(255,125,105,0.95);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.78rem;
    max-width: 250px;
    text-align: center;
    line-height: 1.5;
  }

  /* ── Dots + nav row ──────────────────────── */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.45);
    transition: background 0.18s, color 0.18s;
    flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.8); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .nav-btn svg { width: 16px; height: 16px; }

  .dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.20);
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .dot.active {
    background: rgba(255,255,255,0.70);
    transform: scale(1.25);
  }

  /* ── Upcoming strip ──────────────────────── */
  .upcoming {
    width: 100%;
    max-width: 420px;
  }

  .up-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    align-items: baseline;
    gap: 8px;
    padding: 11px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .up-row:last-child { border-bottom: none; }

  .up-period {
    font-size: 0.82rem;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
  }

  .up-short {
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(255,255,255,0.52);
  }

  .up-temp {
    font-size: 1rem;
    font-weight: 300;
    font-style: italic;
    color: rgba(255,255,255,0.72);
    text-align: right;
    letter-spacing: -0.02em;
    min-width: 38px;
  }
</style>
</head>
<body>

<div class="carousel-outer" id="carousel-outer">
  <div class="carousel-track-clip">
    <div class="carousel-track" id="carousel-track">
      <!-- cards injected by JS -->
    </div>
  </div>

  <div class="load-overlay" id="load-overlay">
    <div class="spinner"></div>
    <div class="load-text">Fetching forecast…</div>
  </div>
</div>

<div class="nav-row" id="nav-row" style="display:none">
  <button class="nav-btn" id="btn-prev" aria-label="Previous" disabled>
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="10 3 5 8 10 13"/>
    </svg>
  </button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="btn-next" aria-label="Next">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 3 11 8 6 13"/>
    </svg>
  </button>
</div>

<div class="upcoming" id="upcoming"></div>

<script>
const AGENT  = 'nws-forecast-mobile/1.0';
const LAT    = 42.3776;
const LON    = -71.0602;
let gridCache = null;
let currentIndex = 0;
let totalCards   = 0;

/* ── Gradients ──────────────────────────── */
const GRADIENTS = {
  'clear-day':   ['#1d4e9a','#0c2448'],
  'clear-night': ['#080c14','#04080f'],
  'partly':      ['#1a4480','#0d2040'],
  'overcast':    ['#252e3a','#111820'],
  'rain':        ['#162030','#0a1218'],
  'fog':         ['#202c38','#111c24'],
  'snow':        ['#1e2e46','#0e1828'],
  'thunder':     ['#10181e','#060c10'],
};

function classify(text, isDay) {
  const t = text.toLowerCase();
  if (t.includes('thunder'))                                              return 'thunder';
  if (t.includes('snow') || t.includes('blizzard'))                      return 'snow';
  if (t.includes('rain') || t.includes('shower') || t.includes('drizzle')) return 'rain';
  if (t.includes('fog')  || t.includes('mist')   || t.includes('haze'))  return 'fog';
  if (t.includes('overcast') || t.includes('mostly cloudy'))             return 'overcast';
  if (t.includes('partly')   || t.includes('mostly sunny'))              return 'partly';
  if (t.includes('sunny')    || t.includes('clear'))                     return isDay ? 'clear-day' : 'clear-night';
  if (t.includes('cloud'))                                                return 'overcast';
  return isDay ? 'partly' : 'clear-night';
}

function makeHeadline(short) {
  return short.replace(/\s+then\b.*/i, '').trim();
}

function parseWind(ws) {
  if (!ws) return '—';
  const m = ws.match(/(\d+)/g);
  return m ? m[m.length - 1] : '—';
}

/* ── Build a single card element ────────── */
function buildCard(period) {
  const isDay = period.isDaytime !== false;
  const cond  = classify(period.shortForecast, isDay);
  const [c1, c2] = GRADIENTS[cond] || GRADIENTS['partly'];

  const card = document.createElement('div');
  card.className = 'forecast-card';
  card.style.background = `linear-gradient(155deg, ${c1} 0%, ${c2} 100%)`;

  const detail = period.detailedForecast
    ? `<div class="detail">${period.detailedForecast}</div>`
    : `<div class="detail detail-placeholder">${period.shortForecast}</div>`;

  card.innerHTML = `
    <div class="period-label">${period.name}</div>
    <div class="meta-row">
      <div class="temp">${period.temperature}<span class="temp-deg">°</span></div>
      <div class="wind-block">
        <div class="wind-dir">${period.windDirection ? period.windDirection + ' wind' : 'Wind'}</div>
        <div class="wind-speed">${parseWind(period.windSpeed)}</div>
        <span class="wind-mph">mph</span>
      </div>
    </div>
    <div class="headline">${makeHeadline(period.shortForecast)}</div>
    <div class="divider"></div>
    ${detail}
    <div class="card-footer">
      <div class="footer-left">
        <div class="location">Charlestown, MA</div>
        <div class="updated" id="updated-label">—</div>
      </div>
      <button class="refresh-btn" id="refresh-btn" aria-label="Refresh">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M13.5 8A5.5 5.5 0 1 1 10 3.1"/>
          <polyline points="10 1 10 4 13 4"/>
        </svg>
      </button>
    </div>
  `;

  card.querySelector('#refresh-btn').addEventListener('click', () => {
    gridCache = null; load();
  });

  return card;
}

/* ── Nav ─────────────────────────────────── */
function goTo(idx) {
  currentIndex = Math.max(0, Math.min(idx, totalCards - 1));
  document.getElementById('carousel-track').style.transform =
    `translateX(-${currentIndex * 100}%)`;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === totalCards - 1;
  document.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === currentIndex));
}

/* ── Swipe support ───────────────────────── */
function initSwipe(el) {
  let startX = null;
  el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  el.addEventListener('touchend', e => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) goTo(currentIndex + (dx < 0 ? 1 : -1));
    startX = null;
  }, { passive: true });
}

/* ── NWS fetch ───────────────────────────── */
async function fetchGrid() {
  if (gridCache) return gridCache;
  const r = await fetch(`https://api.weather.gov/points/${LAT},${LON}`,
    { headers: { 'User-Agent': AGENT } });
  if (!r.ok) throw new Error(`Points lookup failed (${r.status})`);
  const { properties: { gridId, gridX, gridY } } = await r.json();
  return gridCache = { office: gridId, x: gridX, y: gridY };
}

async function load() {
  const overlay = document.getElementById('load-overlay');
  overlay.innerHTML = '<div class="spinner"></div><div class="load-text">Fetching forecast…</div>';
  overlay.style.display = 'flex';
  document.getElementById('nav-row').style.display = 'none';
  document.getElementById('upcoming').innerHTML = '';

  // Reset track
  const track = document.getElementById('carousel-track');
  track.innerHTML = '';
  track.style.transform = 'translateX(0)';
  currentIndex = 0;

  try {
    const g = await fetchGrid();
    const r = await fetch(
      `https://api.weather.gov/gridpoints/${g.office}/${g.x},${g.y}/forecast`,
      { headers: { 'User-Agent': AGENT } });
    if (!r.ok) throw new Error(`Forecast failed (${r.status})`);
    const { properties: { periods } } = await r.json();
    render(periods);
    overlay.style.display = 'none';
  } catch(e) {
    overlay.innerHTML = `<div class="error-pill">⚠ ${e.message}<br><small>Tap refresh to try again</small></div>`;
  }
}

function render(periods) {
  const track     = document.getElementById('carousel-track');
  const dotsEl    = document.getElementById('dots');
  const navRow    = document.getElementById('nav-row');
  const upcomingEl = document.getElementById('upcoming');
  const now       = new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

  // Cards: use the first 4 periods (today, tonight, tomorrow, tomorrow night)
  // Only the first 1-2 will have detailedForecast from NWS
  const cardPeriods = periods.slice(0, 4);
  totalCards = cardPeriods.length;

  dotsEl.innerHTML = '';

  cardPeriods.forEach((p, i) => {
    const card = buildCard(p);
    // stamp the updated time on each card
    card.querySelector('#updated-label').textContent = now;
    track.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  });

  navRow.style.display = 'flex';
  initSwipe(document.getElementById('carousel-track'));

  document.getElementById('btn-prev').addEventListener('click', () => goTo(currentIndex - 1));
  document.getElementById('btn-next').addEventListener('click', () => goTo(currentIndex + 1));
  goTo(0);

  // Upcoming strip: periods 4 onward
  periods.slice(4, 11).forEach(q => {
    const row = document.createElement('div');
    row.className = 'up-row';
    row.innerHTML = `
      <div class="up-period">${q.name}</div>
      <div class="up-short">${makeHeadline(q.shortForecast)}</div>
      <div class="up-temp">${q.temperature}°</div>
    `;
    upcomingEl.appendChild(row);
  });
}

load();
</script>
</body>
</html>
