<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWS Forecast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --sky-clear:   #3A7BD5;
    --sky-mid:     #6FAEE8;
    --sky-pale:    #EAF3FC;
    --cloud:       #BDD8F0;
    --ink:         #1A2535;
    --ink-mid:     #4A5A6E;
    --ink-light:   #8A9BB0;
    --surface:     #FFFFFF;
    --bg:          #F2F7FC;
    --warn:        #E07B3A;
    --radius:      14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--ink-mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .location-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 4px;
  }

  .location-name {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--ink);
  }

  .refresh-btn {
    background: none;
    border: 1.5px solid var(--cloud);
    border-radius: 8px;
    width: 34px; height: 34px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--sky-clear);
    transition: background 0.15s, border-color 0.15s;
  }
  .refresh-btn:hover { background: var(--sky-pale); border-color: var(--sky-mid); }
  .refresh-btn svg { width: 16px; height: 16px; }

  .updated {
    font-size: 0.78rem;
    color: var(--ink-light);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  /* Config panel */
  .config {
    background: var(--surface);
    border: 1.5px solid var(--cloud);
    border-radius: var(--radius);
    padding: 18px 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 24px;
  }

  .config summary {
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--sky-clear);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .config summary::-webkit-details-marker { display: none; }
  .config summary::before { content: '›'; font-size: 1rem; transition: transform 0.2s; }
  .config[open] summary::before { transform: rotate(90deg); }

  .config-fields {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .field-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field-row label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--ink-mid);
  }

  .field-row input {
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    padding: 8px 12px;
    border: 1.5px solid var(--cloud);
    border-radius: 8px;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }
  .field-row input:focus { border-color: var(--sky-clear); }

  .coord-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .apply-btn {
    background: var(--sky-clear);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    align-self: flex-start;
    transition: background 0.15s;
  }
  .apply-btn:hover { background: #2d69bd; }

  /* Forecast cards */
  .cards {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--cloud);
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: start;
  }

  .card.today {
    border-color: var(--sky-clear);
    background: linear-gradient(135deg, var(--surface) 60%, var(--sky-pale));
  }

  .period-name {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--sky-clear);
    margin-bottom: 4px;
  }

  .card.today .period-name { color: var(--sky-clear); }

  .short-forecast {
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 6px;
  }

  .detail-forecast {
    font-size: 0.82rem;
    color: var(--ink-mid);
    line-height: 1.5;
  }

  .temp-block {
    text-align: right;
    flex-shrink: 0;
  }

  .temp-value {
    font-size: 2rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1;
  }

  .temp-unit {
    font-size: 0.9rem;
    color: var(--ink-light);
    font-weight: 400;
  }

  .wind-line {
    font-size: 0.72rem;
    color: var(--ink-light);
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
    white-space: nowrap;
  }

  /* Status / error */
  .status {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-light);
    font-size: 0.9rem;
  }

  .error-msg {
    background: #FEF3EC;
    border: 1.5px solid #F0C8A0;
    border-radius: var(--radius);
    padding: 16px 20px;
    color: var(--warn);
    font-size: 0.88rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2.5px solid var(--cloud);
    border-top-color: var(--sky-clear);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111820;
      --surface: #1A2535;
      --ink: #E8F0F8;
      --ink-mid: #8A9BB0;
      --ink-light: #5A6A7E;
      --cloud: #2A3A50;
      --sky-pale: #1A2D45;
    }
    .field-row input { background: #0E1620; }
  }
</style>
</head>
<body>

<header>
  <h1>NWS Forecast</h1>
  <div class="location-row">
    <span class="location-name" id="loc-name">Charlestown, MA</span>
    <button class="refresh-btn" id="refresh-btn" title="Refresh">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.5 8A5.5 5.5 0 1 1 10 3.1"/>
        <polyline points="10 1 10 4 13 4"/>
      </svg>
    </button>
  </div>
  <div class="updated" id="updated-time"></div>
</header>

<details class="config" id="config-panel">
  <summary>Location settings</summary>
  <div class="config-fields">
    <div class="field-row">
      <label>Display name</label>
      <input type="text" id="cfg-name" value="Charlestown, MA" placeholder="e.g. Charlestown, MA">
    </div>
    <div class="coord-row">
      <div class="field-row">
        <label>Latitude</label>
        <input type="text" id="cfg-lat" value="42.3776" placeholder="42.3776">
      </div>
      <div class="field-row">
        <label>Longitude</label>
        <input type="text" id="cfg-lon" value="-71.0602" placeholder="-71.0602">
      </div>
    </div>
    <button class="apply-btn" id="apply-btn">Apply & fetch</button>
  </div>
</details>

<div class="cards" id="cards"></div>

<script>
const AGENT = 'nws-forecast-widget/1.0 (weather-viewer)';

let gridCache = null; // { office, x, y } keyed by lat/lon

function fmt(date) {
  return date.toLocaleString('en-US', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
}

function windIcon(dir) {
  const dirs = { N:'↓', NNE:'↙', NE:'↙', ENE:'←', E:'←', ESE:'↖', SE:'↖',
                 SSE:'↑', S:'↑', SSW:'↗', SW:'↗', WSW:'→', W:'→', WNW:'↘',
                 NW:'↘', NNW:'↓' };
  return dirs[dir] || '·';
}

function setStatus(html) {
  document.getElementById('cards').innerHTML =
    `<div class="status">${html}</div>`;
}

function setError(msg) {
  document.getElementById('cards').innerHTML =
    `<div class="error-msg">${msg}</div>`;
}

async function fetchGridPoint(lat, lon) {
  const key = `${lat},${lon}`;
  if (gridCache && gridCache.key === key) return gridCache;
  const r = await fetch(`https://api.weather.gov/points/${lat},${lon}`, {
    headers: { 'User-Agent': AGENT }
  });
  if (!r.ok) throw new Error(`Points lookup failed (${r.status})`);
  const d = await r.json();
  const { gridId, gridX, gridY, relativeLocation } = d.properties;
  gridCache = {
    key,
    office: gridId,
    x: gridX,
    y: gridY,
    city: relativeLocation?.properties?.city,
    state: relativeLocation?.properties?.state
  };
  return gridCache;
}

async function fetchForecast(lat, lon) {
  const grid = await fetchGridPoint(lat, lon);
  const r = await fetch(
    `https://api.weather.gov/gridpoints/${grid.office}/${grid.x},${grid.y}/forecast`,
    { headers: { 'User-Agent': AGENT } }
  );
  if (!r.ok) throw new Error(`Forecast fetch failed (${r.status})`);
  const d = await r.json();
  return d.properties.periods;
}

function renderCards(periods, locationName) {
  const cards = document.getElementById('cards');
  cards.innerHTML = '';

  // Show first 8 periods (4 days of day/night)
  periods.slice(0, 8).forEach((p, i) => {
    const isToday = i === 0;
    const card = document.createElement('div');
    card.className = `card${isToday ? ' today' : ''}`;

    const tempLabel = p.temperatureUnit === 'F' ? '°F' : '°C';
    const windStr = p.windDirection
      ? `${windIcon(p.windDirection)} ${p.windDirection} ${p.windSpeed}`
      : p.windSpeed || '';

    card.innerHTML = `
      <div>
        <div class="period-name">${p.name}</div>
        <div class="short-forecast">${p.shortForecast}</div>
        <div class="detail-forecast">${p.detailedForecast}</div>
      </div>
      <div class="temp-block">
        <div class="temp-value">${p.temperature}<span class="temp-unit">${tempLabel}</span></div>
        ${windStr ? `<div class="wind-line">${windStr}</div>` : ''}
      </div>
    `;
    cards.appendChild(card);
  });

  document.getElementById('updated-time').textContent = `Updated ${fmt(new Date())}`;
}

async function load() {
  const lat = document.getElementById('cfg-lat').value.trim();
  const lon = document.getElementById('cfg-lon').value.trim();
  const name = document.getElementById('cfg-name').value.trim();

  document.getElementById('loc-name').textContent = name || 'My Location';
  document.getElementById('updated-time').textContent = '';
  setStatus('<div class="spinner"></div><br>Fetching forecast…');

  try {
    const periods = await fetchForecast(lat, lon);
    renderCards(periods, name);
  } catch (e) {
    setError(`⚠ ${e.message}<br><small>Check your coordinates or try again.</small>`);
  }
}

document.getElementById('refresh-btn').addEventListener('click', load);
document.getElementById('apply-btn').addEventListener('click', () => {
  gridCache = null; // bust cache on coord change
  load();
});

// Load on startup
load();
</script>
</body>
</html>
