<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panorama Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    rgba(255,255,255,0.07);
      --text:      rgba(255,255,255,0.85);
      --muted:     rgba(255,255,255,0.35);
      --accent:    #2a6496;
      --radius:    6px;
      --gap:       16px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* ── Header ── */
    header {
      padding: 40px 32px 24px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 200;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }
    header p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Grid ── */
    main {
      padding: var(--gap);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
      gap: var(--gap);
    }

    /* ── Card ── */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, transform 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:hover {
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }
    .card:active {
      transform: translateY(0);
    }

    /* Thumbnail container — panoramic 3:1 crop */
    .card-thumb {
      position: relative;
      width: 100%;
      padding-top: 33.33%;   /* 3:1 aspect ratio */
      overflow: hidden;
      background: #111;
    }
    .card-thumb img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      transition: transform 0.4s ease;
    }
    .card:hover .card-thumb img {
      transform: scale(1.03);
    }

    /* Hover overlay — sweep across on hover to hint at panning */
    .card-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(42,100,150,0.0) 0%,
        rgba(42,100,150,0.15) 50%,
        rgba(42,100,150,0.0) 100%
      );
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:hover .card-thumb::after {
      opacity: 1;
    }

    /* Pan icon badge */
    .card-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 50px;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }
    .card-badge svg {
      width: 12px; height: 12px;
      opacity: 0.7;
    }

    /* Card info */
    .card-info {
      padding: 14px 16px 16px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .card-heading {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-heading span.val {
      color: rgba(255,255,255,0.6);
      font-variant-numeric: tabular-nums;
    }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      padding: 80px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .empty code {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
  </style>
</head>
<body>

  <header>
    <h1>Panoramas</h1>
    <p>Tap any image to open the gyroscope viewer</p>
  </header>

  <main>
    <div class="grid" id="grid">
      <!-- Cards injected by JS -->
    </div>
  </main>

  <script src="https://unpkg.com/exifr@7/dist/full.umd.cjs"></script>
  <script>
    // ═══════════════════════════════════════════════════════
    //  PANORAMA LIST
    //  Add your JPEG filenames here. Title and heading are
    //  optional — if omitted, title defaults to the filename
    //  and heading is read from EXIF automatically.
    // ═══════════════════════════════════════════════════════
    const PANORAMAS = [
      { file: 'IMG_2030.jpeg', title: 'Lake View' },
      { file: 'IMG_1979.jpeg', title: 'Mountain Ridge' },
      { file: 'IMG_1965.jpeg' },  // title will default to filename
    ];

    const VIEWER = 'panorama_flat.html';  // path to the gyroscope viewer
    const COMPASS_FLIP = true;            // match the viewer setting

    const grid = document.getElementById('grid');

    function headingToCardinal(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
                    'S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function formatFilename(f) {
      return f.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
    }

    async function buildCard(pano) {
      const file  = pano.file;
      const title = pano.title || formatFilename(file);

      // Create card element
      const card = document.createElement('a');
      card.className = 'card';
      card.href = `${VIEWER}?img=${encodeURIComponent(file)}`;

      card.innerHTML = `
        <div class="card-thumb">
          <img src="${file}" alt="${title}" loading="lazy">
          <div class="card-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6"/>
              <path d="M15 18l6-6-6-6" opacity="0.4"/>
            </svg>
            360°
          </div>
        </div>
        <div class="card-info">
          <div class="card-title">${title}</div>
          <div class="card-heading" id="hdg-${file}">
            <span style="color:var(--muted)">↑</span>
            <span class="val">—</span>
          </div>
        </div>`;

      grid.appendChild(card);

      // Read EXIF heading asynchronously and update the card
      try {
        const exif = await exifr.parse(file, ['GPSImgDirection', 'GPSImgDirectionRef']);
        if (exif && exif.GPSImgDirection != null) {
          const raw = exif.GPSImgDirection;
          const heading = COMPASS_FLIP ? (raw + 180) % 360 : raw;
          const cardinal = headingToCardinal(heading);
          const hdgEl = document.getElementById(`hdg-${file}`);
          if (hdgEl) {
            hdgEl.innerHTML = `
              <span style="color:var(--muted)">↑</span>
              <span class="val">${Math.round(heading)}° ${cardinal}</span>`;
          }
        }
      } catch (e) {
        // No EXIF — leave heading blank
      }
    }

    async function init() {
      if (!PANORAMAS.length) {
        grid.innerHTML = `<div class="empty">
          No panoramas configured.<br>
          Add filenames to the <code>PANORAMAS</code> array in gallery.html.
        </div>`;
        return;
      }
      // Build cards in order, EXIF loads in parallel
      for (const pano of PANORAMAS) {
        await buildCard(pano);
      }
    }

    init();
  </script>
</body>
</html>
