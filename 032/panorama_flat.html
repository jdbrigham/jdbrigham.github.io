<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Panorama Viewer</title>
  <script src="https://unpkg.com/exifr@7/dist/full.umd.cjs"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Desktop: tall scroll container */
    body.desktop-mode { overflow-y: scroll; }
    #scrollProxy {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 1px;
    }
    body.desktop-mode #scrollProxy { display: block; }

    /* ── Panorama image ── */
    #panorama {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: 50% center;
      will-change: object-position;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Overlay UI ── */
    #ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
      pointer-events: none;
      z-index: 10;
    }

    /* Permission screen */
    #permScreen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 20;
      padding: 40px;
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #permScreen h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #permScreen p {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      line-height: 1.6;
      max-width: 280px;
    }
    #grantBtn {
      margin-top: 8px;
      padding: 14px 36px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      pointer-events: all;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }
    #grantBtn:active { opacity: 0.7; }

    /* HUD */
    #hud {
      display: none;
      pointer-events: none;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 10px 22px;
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Tilt indicator */
    #tiltBar {
      display: none;
      width: min(280px, 70vw);
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: visible;
      position: relative;
      margin-bottom: 4px;
    }
    #tiltBar::before {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 1px; height: 10px;
      background: rgba(255,255,255,0.3);
    }
    #tiltDot {
      position: absolute;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
    }

    /* ── Compass ── */
    #compassWrap {
      display: none;
      position: fixed;
      bottom: max(48px, env(safe-area-inset-bottom, 48px));
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 160px;
      z-index: 15;
      pointer-events: none;
      /* 3D context: children share this vanishing point */
      perspective: 320px;
      perspective-origin: 50% 50%;
    }
    #compass {
      width: 100%;
      height: 100%;
      /* Tilt away — looks like it's lying flat on the ground */
      transform: rotateX(62deg);
      transform-origin: center center;
      will-change: transform;
    }

    /* ── Heading display ── */
    #headingDisplay {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      text-align: center;
      pointer-events: none;
      animation: headingFadeOut 3s ease-out forwards;
    }
    #headingDisplay .deg {
      font-size: clamp(64px, 15vw, 120px);
      font-weight: 100;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: 0 2px 40px rgba(0,0,0,0.6);
    }
    #headingDisplay .label {
      font-size: clamp(13px, 3vw, 20px);
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 6px;
    }
    @keyframes headingFadeOut {
      0%   { opacity: 1; }
      60%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <img id="panorama" src="IMG_0541.jpg" alt="Panorama">

  <div id="permScreen">
    <h1>Panorama Viewer</h1>
    <p>Tilt your iPhone left and right to pan across the scene.</p>
    <button id="grantBtn">Enable Gyroscope</button>
  </div>

  <div id="scrollProxy"></div>

  <div id="ui">
    <div id="tiltBar"><div id="tiltDot"></div></div>
    <div id="hud"></div>
  </div>

  <div id="compassWrap">
    <svg id="compass" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer ring (outside the rose group, always fixed) -->
      <circle cx="50" cy="50" r="47" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

      <!-- Rose group: ticks, cardinal labels, facing marker.
           Rotated by JS so COMPASS_START sits at 12 o'clock. -->
      <g id="compassRose" transform="rotate(0,50,50)">
        <circle cx="50" cy="50" r="40" fill="rgba(0,0,0,0.45)" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>
        <!-- Minor ticks every 10° -->
        <g stroke="rgba(255,255,255,0.3)" stroke-width="0.75">
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(10,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(20,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(30,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(40,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(50,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(60,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(70,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(80,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(100,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(110,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(120,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(130,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(140,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(150,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(160,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(170,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(190,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(200,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(210,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(220,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(230,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(240,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(250,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(260,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(280,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(290,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(300,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(310,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(320,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(330,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(340,50,50)"/>
          <line x1="50" y1="10" x2="50" y2="14" transform="rotate(350,50,50)"/>
        </g>
        <!-- Cardinal ticks (longer, brighter) -->
        <g stroke="rgba(255,255,255,0.55)" stroke-width="1.2">
          <line x1="50" y1="8" x2="50" y2="16"/>
          <line x1="50" y1="8" x2="50" y2="16" transform="rotate(90,50,50)"/>
          <line x1="50" y1="8" x2="50" y2="16" transform="rotate(180,50,50)"/>
          <line x1="50" y1="8" x2="50" y2="16" transform="rotate(270,50,50)"/>
        </g>
        <!-- Cardinal labels — rotate with the rose -->
        <text x="50" y="7.5" text-anchor="middle" font-size="7" font-family="Helvetica Neue,sans-serif" font-weight="600" fill="rgba(255,255,255,0.7)">N</text>
        <text x="93" y="53"  text-anchor="middle" font-size="6" font-family="Helvetica Neue,sans-serif" fill="rgba(255,255,255,0.5)">E</text>
        <text x="50" y="98"  text-anchor="middle" font-size="6" font-family="Helvetica Neue,sans-serif" fill="rgba(255,255,255,0.5)">S</text>
        <text x="7"  y="53"  text-anchor="middle" font-size="6" font-family="Helvetica Neue,sans-serif" fill="rgba(255,255,255,0.5)">W</text>

        <!-- ── Photo field-of-view indicators ──────────────────
             All elements start at 0° (top of SVG). JS rotates each one
             to the correct position inside the rose coordinate system.
             Because the rose itself rotates by -COMPASS_START, an element
             at angle A inside the rose appears at (A - COMPASS_START) on screen.
             So to appear at screen-top (0°) we place elements at +COMPASS_START.
             Left bound → COMPASS_START - halfSpan. Right → COMPASS_START + halfSpan.
        -->

        <!-- Centre facing marker — JS sets rotate(COMPASS_START) -->
        <g id="fovCentre" transform="rotate(0,50,50)">
          <polygon points="50,3 53,11 47,11" fill="#2a9fd6"/>
        </g>

        <!-- Left bound marker — JS sets rotate(COMPASS_START - halfSpan) -->
        <g id="fovLeft" transform="rotate(0,50,50)">
          <line x1="50" y1="3" x2="50" y2="13"
                stroke="rgba(100,180,230,0.6)" stroke-width="1.5"/>
          <polygon points="50,14 52,19 48,19" fill="rgba(100,180,230,0.5)"/>
        </g>

        <!-- Right bound marker — JS sets rotate(COMPASS_START + halfSpan) -->
        <g id="fovRight" transform="rotate(0,50,50)">
          <line x1="50" y1="3" x2="50" y2="13"
                stroke="rgba(100,180,230,0.6)" stroke-width="1.5"/>
          <polygon points="50,14 52,19 48,19" fill="rgba(100,180,230,0.5)"/>
        </g>

        <!-- Arc connecting the two bounds, drawn by JS -->
        <path id="fovArc" d="" fill="none"
              stroke="rgba(100,180,230,0.25)" stroke-width="2.5"/>
      </g>

      <!-- Fixed heading label at centre — absolute degrees, never rotates -->
      <text id="compassHeadingDeg" x="50" y="56"
            text-anchor="middle" font-size="9"
            font-family="Helvetica Neue,sans-serif" font-weight="300"
            fill="rgba(255,255,255,0.9)" letter-spacing="0.5">--°</text>
      <text id="compassHeadingCard" x="50" y="65"
            text-anchor="middle" font-size="6"
            font-family="Helvetica Neue,sans-serif" font-weight="400"
            fill="rgba(255,255,255,0.5)" letter-spacing="1">--</text>

      <!-- Needle: rotates relative to the rose, so angle = panHeading - COMPASS_START -->
      <g id="compassNeedle" transform="rotate(0,50,50)">
        <!-- Forward tip: blue -->
        <polygon points="50,18 53,50 50,43 47,50" fill="#2a9fd6"/>
        <!-- Rear tip: muted -->
        <polygon points="50,82 53,50 50,57 47,50" fill="rgba(255,255,255,0.25)"/>
        <!-- Centre cap -->
        <circle cx="50" cy="50" r="2.5" fill="rgba(255,255,255,0.9)"/>
      </g>
    </svg>
  </div>

  <div id="headingDisplay">
    <div class="deg" id="headingDeg">--°</div>
    <div class="label" id="headingLabel">--</div>
  </div>

  <script>
    // Disable browser scroll restoration so the page always
    // opens at the correct pan position, not wherever it was left
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }

    // ═══════════════════════════════════════════════════════
    //  CONFIG
    // ═══════════════════════════════════════════════════════
    const GAMMA_MIN       = -40;   // gyro: left-tilt → left edge
    const GAMMA_MAX       =  40;   // gyro: right-tilt → right edge
    const SMOOTHING       = 0.07;  // 0.04 buttery · 0.15 snappy
    const SCROLL_HEIGHT   = 3000;  // desktop: px of scroll travel = full pan
    let   COMPASS_START   = 0;     // set from EXIF GPSImgDirection on load; = camera facing direction
    const COMPASS_SPAN    = 120;   // degrees swept across the full pan range
    // ═══════════════════════════════════════════════════════

    const panorama    = document.getElementById('panorama');

    // Read image filename from URL param ?img=filename.jpg
    // Falls back to the src already set on the <img> tag if no param supplied
    const params   = new URLSearchParams(window.location.search);
    const JPEG_SRC = params.get('img') || panorama.getAttribute('src');
    panorama.src   = JPEG_SRC;
    const permScreen  = document.getElementById('permScreen');
    const grantBtn    = document.getElementById('grantBtn');
    const hud         = document.getElementById('hud');
    const tiltBar     = document.getElementById('tiltBar');
    const tiltDot     = document.getElementById('tiltDot');
    const scrollProxy = document.getElementById('scrollProxy');

    let currentPct  = 50;
    let targetPct   = 50;
    let latestGamma = 0;
    let mode        = null;
    let _lastPctForHeading = 50;

    // ── Load EXIF then start ─────────────────────────────────
    async function loadExifThenInit() {
      try {
        const exif = await exifr.parse(JPEG_SRC, ['GPSImgDirection', 'GPSImgDirectionRef']);
        if (exif && exif.GPSImgDirection != null) {
          COMPASS_START = exif.GPSImgDirection;
          console.log('GPSImgDirection from EXIF:', COMPASS_START.toFixed(1) + '°',
            exif.GPSImgDirectionRef ? '(' + exif.GPSImgDirectionRef + ')' : '');
        } else {
          console.warn('GPSImgDirection not found in EXIF — using default 0°');
        }
      } catch (err) {
        console.warn('EXIF read failed:', err.message, '— using default 0°');
      }
      setFovMarkers();
      detectAndStart();
    }

    loadExifThenInit();

    // ── Detect mobile vs desktop ─────────────────────────────
    function detectAndStart() {
      const isMobile       = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const needsPermission = typeof DeviceOrientationEvent !== 'undefined' &&
                              typeof DeviceOrientationEvent.requestPermission === 'function';

      if (!isMobile) {
        // Desktop — use scroll mode regardless of sensor API presence
        startScrollMode();
      } else if (!needsPermission) {
        // Android or older iOS — gyro available, no dialog needed
        startGyroMode();
      }
      // else: iOS 13+ — wait for button tap
    }

    // ── SCROLL MODE ──────────────────────────────────────────
    function startScrollMode() {
      mode = 'scroll';
      permScreen.style.display = 'none';
      document.body.classList.add('desktop-mode');
      scrollProxy.style.height = (SCROLL_HEIGHT + window.innerHeight) + 'px';
      // Scroll to 50% = centre of pan range = COMPASS_START heading
      window.scrollTo(0, SCROLL_HEIGHT * 0.5);
      hud.textContent = 'Scroll to pan';
      hud.style.display = 'block';
      tiltBar.style.display = 'block';
      document.getElementById('compassWrap').style.display = 'block';
      window.addEventListener('scroll', onScroll, { passive: true });
      rafLoop();
    }

    function onScroll() {
      targetPct = Math.min(100, (window.scrollY / SCROLL_HEIGHT) * 100);
    }

    // ── GYRO MODE ────────────────────────────────────────────
    grantBtn.addEventListener('click', () => {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === 'granted') startGyroMode();
            else alert('Permission denied. Allow motion access in Settings › Safari.');
          })
          .catch(console.error);
      } else {
        startGyroMode();
      }
    });

    function startGyroMode() {
      mode = 'gyro';
      permScreen.style.display = 'none';
      hud.textContent = 'Tilt to pan';
      hud.style.display = 'block';
      tiltBar.style.display = 'block';
      document.getElementById('compassWrap').style.display = 'block';
      window.addEventListener('deviceorientation', onOrientation, true);
      rafLoop();
    }

    function onOrientation(e) {
      if (e.gamma !== null) latestGamma = e.gamma;
    }

    // ── Cardinal direction label ─────────────────────────────
    function headingToCardinal(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
                    'S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    // ── rAF loop ─────────────────────────────────────────────
    // ── FOV marker setup ────────────────────────────────────
    function setFovMarkers() {
      const halfSpan = COMPASS_SPAN / 2;
      const cs = COMPASS_START;

      // The rose rotates by -cs, so to appear at screen-top (0°),
      // an element inside the rose must be at angle +cs.
      // Centre marker: at cs (appears at top after rose rotates by -cs)
      document.getElementById('fovCentre')
        .setAttribute('transform', `rotate(${cs},50,50)`);

      // Left bound: cs - halfSpan inside rose → appears at -halfSpan on screen
      document.getElementById('fovLeft')
        .setAttribute('transform', `rotate(${cs - halfSpan},50,50)`);

      // Right bound: cs + halfSpan inside rose → appears at +halfSpan on screen
      document.getElementById('fovRight')
        .setAttribute('transform', `rotate(${cs + halfSpan},50,50)`);

      // Arc: sweep from left to right bound, just inside the outer ring (r=44)
      // Angles in rose space: cs-halfSpan to cs+halfSpan
      // toRad converts SVG angle (0°=top) to Math angle (0°=right)
      const r = 44;
      const toRad = d => (d - 90) * Math.PI / 180;
      const lx = 50 + r * Math.cos(toRad(cs - halfSpan));
      const ly = 50 + r * Math.sin(toRad(cs - halfSpan));
      const rx = 50 + r * Math.cos(toRad(cs + halfSpan));
      const ry = 50 + r * Math.sin(toRad(cs + halfSpan));
      const largeArc = halfSpan * 2 > 180 ? 1 : 0;
      document.getElementById('fovArc')
        .setAttribute('d', `M ${lx.toFixed(2)} ${ly.toFixed(2)} A ${r} ${r} 0 ${largeArc} 1 ${rx.toFixed(2)} ${ry.toFixed(2)}`);

      window._fovSet = true;
    }

    function rafLoop() {
      if (mode === 'gyro') {
        const clamped = Math.max(GAMMA_MIN, Math.min(GAMMA_MAX, latestGamma));
        targetPct = ((clamped - GAMMA_MIN) / (GAMMA_MAX - GAMMA_MIN)) * 100;
      }

      currentPct += (targetPct - currentPct) * SMOOTHING;

      // Pan via object-position
      panorama.style.objectPosition = `${currentPct.toFixed(2)}% center`;
      tiltDot.style.left = currentPct.toFixed(1) + '%';

      // Compass + heading
      const panHeading = (COMPASS_START - COMPASS_SPAN / 2 + (currentPct / 100) * COMPASS_SPAN + 360) % 360;
      // ── Set FOV markers (fallback if EXIF loaded before rAF started) ──
      if (!window._fovSet) setFovMarkers();

      // Rotate the rose so COMPASS_START sits at 12 o'clock.
      // Rose rotation = -COMPASS_START (bring facing direction to top).
      document.getElementById('compassRose')
        .setAttribute('transform', `rotate(${-COMPASS_START},50,50)`);

      // Needle points to panHeading in absolute degrees.
      // Since the rose is rotated by -COMPASS_START, needle must compensate:
      // needle rotation = panHeading - COMPASS_START
      // At pan centre: panHeading ≈ COMPASS_START → needle angle ≈ 0 → points to top ✓
      const needleAngle = panHeading - COMPASS_START;
      document.getElementById('compassNeedle')
        .setAttribute('transform', `rotate(${needleAngle},50,50)`);

      // Populate the fixed heading label once COMPASS_START is known
      const _hdgDegEl  = document.getElementById('compassHeadingDeg');
      const _hdgCardEl = document.getElementById('compassHeadingCard');
      if (_hdgDegEl && _hdgDegEl.textContent === '--°') {
        const startRounded = Math.round(COMPASS_START);
        _hdgDegEl.textContent  = startRounded + '°';
        _hdgCardEl.textContent = headingToCardinal(startRounded);
      }

      const roundedHeading = Math.round(panHeading);
      document.getElementById('headingDeg').textContent   = roundedHeading + '°';
      document.getElementById('headingLabel').textContent = headingToCardinal(roundedHeading);

      const headingEl = document.getElementById('headingDisplay');
      if (Math.abs(currentPct - _lastPctForHeading) > 0.15) {
        headingEl.style.display   = 'block';
        headingEl.style.animation = 'none';
        headingEl.offsetHeight;
        headingEl.style.animation = 'headingFadeOut 3s ease-out forwards';
        _lastPctForHeading = currentPct;
      }

      requestAnimationFrame(rafLoop);
    }
  </script>
</body>
</html>
